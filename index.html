<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <title>Confirmação de Presença</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="card">

    <img 
      src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png"

    >

    <h1>Festa da Wendy 🎉</h1>

    <p>
      Você está convidado para comemorar os 6 aninhos da Wendy!<br><br>
      📅 16 de Agosto<br>
      ⏰ 15h<br>
      📍 KidPlay Park
    </p>

    <input type="text" id="nome" placeholder="Digite seu nome">

    <input type="number" id="pessoas" placeholder="Quantidade de Criança">
    <input type="number" id="pessoas" placeholder="Quantidade de Adulto"> 
     
   <button id="btnConfirmar">
      Confirmar Presença

    <div class="success" id="mensagem">
      Presença confirmada com sucesso! 💖

    <div class="info">
      Confirme sua presença até 16 de Agosto.
    </div>

  </div>

    <script src="script.js"></script>
