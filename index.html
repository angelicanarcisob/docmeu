<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convite Wendy</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TELA DO VÍDEO -->
<div id="intro">

  <div class="video-box">

    <video id="videoIntro" playsinline preload="auto">
      <source src="Convite da Wendy.mp4" type="video/mp4">
    </video>

    <button id="btnPlay">
      ▶ Abrir Convite
    </button>

  </div>

</div>

  <!-- CONVITE -->
  <div class="card" id="convite">

    <h1>Festa da Wendy 🎉</h1>

    <p>
      Você está convidado para comemorar os 6 aninhos da Wendy!<br><br>
      📅 16 de Agosto<br>
      ⏰ 15h<br>
      📍 KidPlay Park
    </p>
<!-- ADICIONE ISSO NO LUGAR DOS INPUTS ANTIGOS -->

<input type="number" id="quantidade" placeholder="Quantidade total de convidados">

<div id="camposDinamicos"></div>

<button id="btnConfirmar">
  Confirmar Presença
</button>

</div>

  </div>

  <script src="script.js"></script>

</body>
</html>
