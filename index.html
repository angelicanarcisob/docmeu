<!doctype html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversário da Wendy</title>
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    
    <!-- SDKs (Ajuste os caminhos se forem locais ou externos) -->
    <script src="/_sdk/element_sdk.js"></script>
    <script src="/_sdk/data_sdk.js"></script>
    
    <!-- Arquivos Locais -->
    <link rel="stylesheet" href="stryle.css">
</head>
<body class="h-full">
    <div id="app" class="w-full h-full overflow-auto relative main-gradient">
        <!-- Overlay de Fundo -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute inset-0 opacity-50 bg-blobs"></div>
            <div class="absolute top-20 left-10 w-32 h-32 rounded-full opacity-40 blob-1"></div>
            <div class="absolute top-1/4 right-5 w-40 h-40 rounded-full opacity-35 blob-2"></div>
            <div class="absolute bottom-1/3 left-1/4 w-36 h-36 rounded-full opacity-30 blob-3"></div>
        </div>

        <div class="relative z-10">
            <!-- Navegação -->
            <div class="sticky top-0 z-50 bg-gradient-to-r from-purple-400/30 to-purple-300/30 backdrop-blur-2xl border-b-2 border-purple-300/50">
                <div class="max-w-lg mx-auto px-4 flex gap-2 py-3">
                    <button id="convite-tab" class="flex-1 py-2 px-4 rounded-xl font-semibold text-sm transition-all bg-gradient-to-r from-purple-300 to-purple-200 text-purple-900 shadow-lg border border-purple-200">💌 Convite</button>
                    <button id="admin-tab" class="flex-1 py-2 px-4 rounded-xl font-semibold text-sm transition-all bg-white/20 backdrop-blur-md text-white hover:bg-white/30 border border-white/40">📊 Administrar</button>
                </div>
            </div>

            <!-- Conteúdo Convite -->
            <div id="convite-content" class="max-w-lg mx-auto px-4 py-8">
                <!-- ... (Mantenha todo o conteúdo original da div "convite-content" aqui) ... -->
                <div class="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border-4 border-purple-200/80">
                     <!-- Cabeçalho -->
                    <div class="text-center pt-8 pb-4 px-6 header-bg">
                        <div class="text-5xl mb-3 float-anim">🎂</div>
                        <h1 id="title" class="text-4xl mb-1 font-black text-purple-700">Aniversário da Wendy</h1>
                        <div class="flex items-center justify-center gap-2 mt-3">
                            <span class="text-purple-400">🌸</span>
                            <p class="text-purple-500 font-semibold text-lg">Estou fazendo <span class="text-2xl font-bold text-purple-600">6 aninhos!</span></p>
                            <span class="text-purple-400">🌸</span>
                        </div>
                        <a href="https://youtube.com/shorts/6djS8HDvTF4" target="_blank" class="mt-4 inline-flex items-center justify-center gap-2 w-full py-3 bg-gradient-to-r from-purple-600 to-purple-800 text-white font-bold rounded-xl shadow-lg">🎥 Assistir Vídeo</a>
                    </div>
                    
                    <!-- Informações e Forms (Igual ao original) -->
                    <!-- ... -->
                </div>
            </div>

            <!-- Conteúdo Admin -->
            <div id="admin-content" class="hidden max-w-lg mx-auto px-4 py-8">
                <!-- ... (Mantenha todo o conteúdo original da div "admin-content" aqui) ... -->
            </div>
        </div>
    </div>

    <!-- Script Principal -->
    <script src="script.js"></script>
</body>
</html>
